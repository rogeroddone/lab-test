<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a0a0a;
  color: #eee;
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  display: flex;
  flex-direction: column;
}

/* ── Overlay UI (always visible) ─────────────────────────────────────────── */
#overlay {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 20px 24px;
  pointer-events: none;
  z-index: 20;
}

/* Contenteditable — underline only, no box */
#textInput {
  pointer-events: all;
  background: transparent;
  border: none;
  border-bottom: 0.5px solid rgba(255,255,255,0.35);
  color: #ffffff;
  font-size: 13px;
  font-family: 'Courier New', Courier, monospace;
  line-height: 1.5;
  outline: none;
  width: calc(15ch);
  min-height: calc(1 * 13px * 1.5);
  max-height: calc(5 * 13px * 1.5);
  overflow: hidden;
  word-break: break-all;
  white-space: pre-wrap;
  caret-color: #ffffff;
}
#textInput.light-bg {
  color: #111111;
  border-bottom-color: rgba(0,0,0,0.3);
  caret-color: #111111;
}

/* ── Theme dots — 4 particle colors × 4 themes, horizontal ───────────────── */
#themes {
  pointer-events: all;
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 6px;
  margin-top: 3px;
}

/* Invisible hit rectangle wrapping each group of 4 dots */
.theme-group {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  padding: 4px 2px;      /* expands the clickable/hoverable area */
  opacity: 0.3;           /* unselected: 50% - 20% = 30% */
  transition: opacity 0.15s;
}
.theme-group:hover   { opacity: 0.6; }
.theme-group.active  { opacity: 1; }

.tdot {
  width: 6.24px;
  height: 6.24px;
  border-radius: 50%;
  border: 0.5px solid rgba(255,255,255,0.15);
  flex-shrink: 0;
  pointer-events: none;  /* clicks pass through to the group */
}

/* ── Controls panel (hidden by default, press C) ─────────────────────────── */
#controls {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.85);
  border-top: 0.5px solid rgba(255,255,255,0.1);
  padding: 14px 24px;
  z-index: 20;
  display: none;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
#controls.visible { display: flex; flex-wrap: wrap; gap: 14px 22px; align-items: center; }

.ctrl {
  display: flex;
  align-items: center;
  gap: 6px;
}
.ctrl label {
  font-size: 10px;
  color: #777;
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.ctrl input[type=range] {
  width: 80px;
  cursor: pointer;
  accent-color: #eee;
}
.ctrl .val {
  font-size: 10px;
  color: #aaa;
  width: 32px;
}
.ctrl input[type=color] {
  width: 24px; height: 20px;
  border: none; border-radius: 3px;
  cursor: pointer; padding: 0; background: none;
}
.ctrl-hint {
  font-size: 10px;
  color: #555;
  margin-left: auto;
}
.ctrl-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}
.ctrl-toggle label {
  font-size: 10px;
  color: #777;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  cursor: pointer;
}
.toggle-btn {
  width: 28px; height: 16px;
  border-radius: 8px;
  background: #333;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle-btn.on { background: #eee; }
.toggle-btn::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: #888;
  transition: left 0.2s, background 0.2s;
}
.toggle-btn.on::after { left: 14px; background: #111; }

.ctrl-separator {
  width: 0.5px;
  height: 24px;
  background: rgba(255,255,255,0.1);
  align-self: center;
}

#canvas {
  flex: 1;
  display: block;
  cursor: none;
  width: 100%;
  height: 100%;
}

/* Hide the canvas crosshair cursor — parent portfolio provides the cursor */
.notype-hide-cursor * { cursor: none !important; }
</style>
</head>
<body>

<!-- Always-visible overlay: text input + particle color dots -->
<div id="overlay">
  <div id="textInput" contenteditable="true" spellcheck="false">try me</div>
  <div id="themes"></div>
</div>

<!-- Developer controls (press C) -->
<div id="controls">
  <div class="ctrl">
    <label>Particles</label>
    <input type="range" id="partSlider" min="50" max="5000" value="5000" step="10" oninput="onControl()">
    <span class="val" id="partVal">5000</span>
  </div>
  <div class="ctrl">
    <label>Tracking</label>
    <input type="range" id="trackSlider" min="-200" max="100" value="-54" oninput="onControl()">
    <span class="val" id="trackVal">-54</span>
  </div>
  <div class="ctrl">
    <label>Leading</label>
    <input type="range" id="leadSlider" min="-200" max="100" value="-54" oninput="onControl()">
    <span class="val" id="leadVal">-54</span>
  </div>
  <div class="ctrl">
    <label>Speed</label>
    <input type="range" id="speedSlider" min="0" max="100" value="58" oninput="onControl()">
    <span class="val" id="speedVal">58</span>
  </div>
  <div class="ctrl">
    <label>Speed 3/4</label>
    <input type="range" id="speed2Slider" min="0" max="100" value="28" oninput="onControl()">
    <span class="val" id="speed2Val">28</span>
  </div>
  <div class="ctrl">
    <label>Radius</label>
    <input type="range" id="radiusSlider" min="1" max="8" value="1" oninput="onControl()">
    <span class="val" id="radiusVal">1</span>
  </div>
  <div class="ctrl">
    <label>Spacing</label>
    <input type="range" id="spacingSlider" min="0" max="5" value="1" step="0.1" oninput="onControl()">
    <span class="val" id="spacingVal">1</span>
  </div>
  <div class="ctrl-separator"></div>
  <!-- Per-theme color editors: shown for active theme -->
  <div style="display:flex;flex-direction:column;gap:6px;">
    <div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.05em;" id="themeEditLabel">Theme 1 colors</div>
    <div style="display:flex;gap:10px;align-items:center;">
      <div class="ctrl"><label>BG</label><input type="color" id="tc_bg" oninput="onThemeColor()"></div>
      <div class="ctrl"><label>Glyph</label><input type="color" id="tc_glyph" oninput="onThemeColor()"></div>
      <div class="ctrl"><label>Glyph opacity</label><input type="range" id="tc_glyphOpacity" min="0" max="100" value="100" step="1" oninput="onThemeColor()"><span class="val" id="tc_glyphOpacityVal">100%</span></div>
      <div class="ctrl"><label>P1</label><input type="color" id="tc_pt" oninput="onThemeColor()"></div>
      <div class="ctrl"><label>P2</label><input type="color" id="tc_fill" oninput="onThemeColor()"></div>
      <div class="ctrl"><label>P3</label><input type="color" id="tc_tert" oninput="onThemeColor()"></div>
      <div class="ctrl"><label>P4</label><input type="color" id="tc_quat" oninput="onThemeColor()"></div>
    </div>
  </div>
  <div class="ctrl-separator"></div>
  <!-- Float mode: layers 2+4 cursor-blind -->
  <div class="ctrl-toggle" onclick="toggleFloat()">
    <div class="toggle-btn" id="floatBtn"></div>
    <label>Float layers 2+4</label>
  </div>
  <!-- Debug char label toggle -->
  <div class="ctrl-toggle" onclick="toggleLabel()">
    <div class="toggle-btn" id="labelBtn"></div>
    <label>Show char labels</label>
  </div>
  <div id="labelControls" style="display:none;gap:8px;align-items:center;flex-wrap:wrap;">
    <div class="ctrl">
      <label>Label size</label>
      <input type="range" id="labelSize" min="6" max="48" value="14" oninput="onControl()">
      <span class="val" id="labelSizeVal">14</span>
    </div>
    <div class="ctrl">
      <label>Label color</label>
      <input type="color" id="labelColor" value="#ffffff" oninput="onControl()">
    </div>
  </div>
  <span class="ctrl-hint">Press C to hide</span>
</div>

<canvas id="canvas"></canvas>

// ─── Theme dot groups (3x2 grid per theme) ───────────────────────────────────
// Grid layout per group:
//   [bg]    [p1]   [p3]
//   [glyph] [p2]   [p4]
function buildThemeDots() {
  const container = document.getElementById('themes');
  container.innerHTML = '';
  THEMES.forEach((t, ti) => {
    const g = document.createElement('div');
    g.className = 'theme-group' + (ti === currentTheme ? ' active' : '');
    g.onclick = () => applyTheme(ti);
    [t.pt, t.fill, t.tert, t.quat].forEach(col => {
      const d = document.createElement('div');
      d.className = 'tdot';
      d.style.background = col;
      g.appendChild(d);
    });
    container.appendChild(g);
  });
}

function applyTheme(idx) {
  currentTheme = idx;
  const t = THEMES[idx];
  bgColor    = t.bg;
  ptColor    = t.pt;
  fillCol    = t.fill;
  tertCol    = t.tert;
  quatCol    = t.quat;
  glyphColor   = t.glyph;
  glyphOpacity = t.glyphOpacity;
  document.body.style.background = bgColor;
  buildThemeDots();
  syncThemeEditors();
  updateInputContrast();
  rebuild();
}

// ─── Input contrast: always readable regardless of bg ─────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}
function relativeLuminance([r,g,b]) {
  const c = [r,g,b].map(v => {
    v /= 255;
    return v <= 0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4);
  });
  return 0.2126*c[0] + 0.7152*c[1] + 0.0722*c[2];
}
function updateInputContrast() {
  const el = document.getElementById('textInput');
  const rgb = hexToRgb(bgColor);
  const lum = relativeLuminance(rgb);
  if (lum > 0.4) {
    el.style.color             = '#111111';
    el.style.borderBottomColor = 'rgba(0,0,0,0.3)';
    el.style.caretColor        = '#111111';
    el.classList.add('light-bg');
    el.classList.remove('dark-bg');
  } else {
    el.style.color             = '#ffffff';
    el.style.borderBottomColor = 'rgba(255,255,255,0.35)';
    el.style.caretColor        = '#ffffff';
    el.classList.add('dark-bg');
    el.classList.remove('light-bg');
  }
}

}

// ─── Click to release particles ───────────────────────────────────────────────
canvas.addEventListener('mousedown', () => {
  clicked = true;
  // Scatter all particles
  const scatter = (arr) => arr.forEach(p => {
    const angle = Math.random() * Math.PI * 2;
    const spd   = 4 + Math.random() * 8;
    p.vx = Math.cos(angle) * spd;
    p.vy = Math.sin(angle) * spd;
    p.released = true;
  });
  scatter(innerParticles);
  scatter(fillParticles);
  scatter(tertiaryParticles);
  scatter(quaternaryParticles);
});

canvas.addEventListener('mouseup', () => {
  clicked = false;
  // Re-enable attraction
  innerParticles.forEach(p => p.released = false);
  fillParticles.forEach(p => p.released = false);
  tertiaryParticles.forEach(p => p.released = false);
  quaternaryParticles.forEach(p => p.released = false);
});

// ─── Input limits: auto-wrap at 15 chars/line, max 3 lines (contenteditable) ──
function enforceInputLimits() {
  const el = document.getElementById('textInput');
  const raw = el.innerText || '';
  const segments = raw.split('\n');
  const wrapped = [];
  for (const seg of segments) {
    if (seg.length <= 15) {
      wrapped.push(seg);
    } else {
      for (let i = 0; i < seg.length; i += 15) {
        wrapped.push(seg.slice(i, i + 15));
      }
    }
    if (wrapped.length >= 5) break;
  }
  const capped = wrapped.slice(0, 5).join('\n');
  if (capped !== raw) {
    el.innerText = capped;
    const range = document.createRange();
    const sel = window.getSelection();
    range.selectNodeContents(el);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
  }
}

// ─── Auto-size: fit text to canvas with 15% vertical padding ─────────────────
// Tracking and leading scale proportionally with glyph size.
// The base reference: at glyphSize=200, tracking=-54, leading=-54.
const BASE_TRACK_RATIO = -54 / 200; // -0.27
const BASE_LEAD_RATIO  = -54 / 200; // -0.27

function computeAutoSize() {
  const text  = document.getElementById('textInput').innerText || 'try me';
  const lines = text.split('\n');
  const maxChars = Math.max(...lines.map(l => l.length || 1));

  const availH = (canvas.height || canvas.offsetHeight) * 0.70;
  const availW = (canvas.width  || canvas.offsetWidth)  * 0.90;

  // glyphW = CS*2 + H*2 + PAD*2  where CS=S/2, H=S/4, PAD=S/8
  // => glyphW = S + S/2 + S/4 = 1.75*S
  const GLYPH_RATIO = 1.75;

  // tracking = BASE_TRACK_RATIO * S  (scales with size)
  // lineW = maxChars * glyphW + (maxChars-1) * tracking
  //       = maxChars * 1.75*S + (maxChars-1) * BASE_TRACK_RATIO * S
  //       = S * (maxChars*1.75 + (maxChars-1)*BASE_TRACK_RATIO)
  const wCoeff = maxChars * GLYPH_RATIO + (maxChars - 1) * BASE_TRACK_RATIO;
  const sFromW = wCoeff > 0 ? availW / wCoeff : 9999;

  // totalH = lines*glyphH + (lines-1)*leading
  //        = S * (lines*GLYPH_RATIO + (lines-1)*BASE_LEAD_RATIO)
  const hCoeff = lines.length * GLYPH_RATIO + (lines.length - 1) * BASE_LEAD_RATIO;
  const sFromH = hCoeff > 0 ? availH / hCoeff : 9999;

  const S = Math.max(20, Math.min(Math.min(sFromW, sFromH), 800));
  // Two-tier sizing: exactly 3 non-space chars = +30%, all others = +15% (vs original 0.8 base)
  const totalChars = lines.reduce((a, l) => a + l.replace(/ /g, '').length, 0);
  const sizeMultiplier = totalChars === 3 ? 1.04 : 0.92;
  // (0.8 * 1.30 = 1.04 for 3 chars; 0.8 * 1.15 = 0.92 for others)
  glyphSize = S * sizeMultiplier;

  // Scale tracking proportionally; leading reduced 40% from base ratio
  tracking = Math.round(BASE_TRACK_RATIO * glyphSize);
  leading  = Math.round(BASE_LEAD_RATIO  * glyphSize * 0.6); // 40% less leading

  // Sync sliders
  document.getElementById('trackSlider').value = tracking;
  document.getElementById('leadSlider').value  = leading;
  document.getElementById('trackVal').textContent = tracking;
  document.getElementById('leadVal').textContent  = leading;

  // Responsive particle count
  const BASE_S = 200;
  const BASE_P = 5000;
  const chars = lines.reduce((a, l) => a + (l.length || 1), 0);
  const area_ratio = (glyphSize / BASE_S) ** 2;
  particleCount = Math.round(Math.max(50, Math.min(BASE_P * area_ratio * chars / 6, 5000)));
  document.getElementById('partSlider').value = particleCount;
  document.getElementById('partVal').textContent = particleCount;
}

// ─── Mandala mask builder ─────────────────────────────────────────────────────
function buildMandalaMask() {
  const CS  = glyphSize / 2;
  const H   = CS / 2;
  const PAD = H * 0.5;
  const W   = Math.ceil(CS * 2 + H * 2 + PAD * 2);
  const HH  = W;
  const oc  = document.createElement('canvas');
  oc.width = W; oc.height = HH;
  const octx = oc.getContext('2d');
  const path = new Path2D(MANDALA_PATH);
  const scale = W / MANDALA_VB;
  octx.save(); octx.scale(scale, scale);
  octx.fillStyle = '#fff'; octx.fill(path);
  octx.restore();
  const id = octx.getImageData(0, 0, W, HH);
  const pixels = new Uint8Array(id.data.buffer);
  return { canvas: oc, pixels, w: W, h: HH };
}

// ─── Glyph mask builder ───────────────────────────────────────────────────────
function buildGlyphMask(char) {
  if (char === '@') return buildMandalaMask();
  const data = GLYPH_DATA[char];
  if (!data || !data.c.length) return null;
  const CS = glyphSize / 2, H = CS / 2, PAD = H * 0.5;
  const W  = Math.ceil(CS*2 + H*2 + PAD*2);
  const HH = Math.ceil(CS*2 + H*2 + PAD*2);
  const oc = document.createElement('canvas');
  oc.width = W; oc.height = HH;
  const octx = oc.getContext('2d');
  const sh = {};
  data.c.forEach(i => sh[i] = { N:false, E:false, S:false, W:false });
  data.e.forEach(([a, b]) => {
    const ra=Math.floor(a/3),ca=a%3,rb=Math.floor(b/3),cb=b%3;
    if(rb===ra&&cb===ca+1){sh[a].E=true;sh[b].W=true;}
    else if(rb===ra&&cb===ca-1){sh[a].W=true;sh[b].E=true;}
    else if(rb===ra+1&&cb===ca){sh[a].S=true;sh[b].N=true;}
    else if(rb===ra-1&&cb===ca){sh[a].N=true;sh[b].S=true;}
  });
  const ir = H / Math.SQRT2;
  octx.fillStyle = '#fff';
  data.c.forEach(idx => {
    const row=Math.floor(idx/3), col=idx%3;
    const cx = PAD + col*CS + CS/2;
    const cy = PAD + row*CS + CS/2;
    const s  = sh[idx];
    const corners = [
      { sharp:s.N, tip:[cx,   cy-H], a1:-3*Math.PI/4, a2:-Math.PI/4 },
      { sharp:s.E, tip:[cx+H, cy  ], a1:-Math.PI/4,   a2: Math.PI/4 },
      { sharp:s.S, tip:[cx,   cy+H], a1: Math.PI/4,   a2: 3*Math.PI/4 },
      { sharp:s.W, tip:[cx-H, cy  ], a1: 3*Math.PI/4, a2: 5*Math.PI/4 },
    ];
    octx.beginPath(); let started = false;
    for (let i=0;i<4;i++) {
      const {sharp,tip,a1,a2}=corners[i];
      if (sharp) {
        if(!started){octx.moveTo(tip[0],tip[1]);started=true;}
        else octx.lineTo(tip[0],tip[1]);
      } else {
        const r=Math.max(1,ir);
        const sx=cx+r*Math.cos(a1),sy=cy+r*Math.sin(a1);
        if(!started){octx.moveTo(sx,sy);started=true;}
        else octx.lineTo(sx,sy);
        octx.arc(cx,cy,r,a1,a2,false);
      }
    }
    octx.closePath(); octx.fill();
  });
  const id = octx.getImageData(0,0,W,HH);
  const pixels = new Uint8Array(id.data.buffer);
  return { canvas:oc, pixels, w:W, h:HH };
}

function insideMask(mask, lx, ly) {
  const ix=lx|0, iy=ly|0;
  if(ix<0||iy<0||ix>=mask.w||iy>=mask.h) return false;
  return mask.pixels[(iy*mask.w+ix)*4] > 128;
}

// ─── Global canvas-space mask ─────────────────────────────────────────────────
function buildGlobalMask() {
  const W = canvas.width, H = canvas.height;
  const buf = new Uint8Array(W * H);
  letterMasks.forEach(({ mask, x, y }) => {
    const x0=Math.floor(x), y0=Math.floor(y);
    for (let py=0;py<mask.h;py++) for (let px=0;px<mask.w;px++) {
      if (mask.pixels[(py*mask.w+px)*4]>128) {
        const gx=x0+px, gy=y0+py;
        if(gx>=0&&gy>=0&&gx<W&&gy<H) buf[gy*W+gx]=1;
      }
    }
  });
  return { pixels:buf, w:W, h:H };
}

function insideAnyLetter(gx, gy) {
  if(!globalMask) return false;
  const ix=gx|0, iy=gy|0;
  if(ix<0||iy<0||ix>=globalMask.w||iy>=globalMask.h) return false;
  return globalMask.pixels[iy*globalMask.w+ix] === 1;
}

function randomInsideMask(mask) {
  for(let t=0;t<500;t++){
    const x=Math.random()*mask.w, y=Math.random()*mask.h;
    if(insideMask(mask,x,y)) return [x,y];
  }
  for(let y=0;y<mask.h;y++) for(let x=0;x<mask.w;x++) if(insideMask(mask,x,y)) return [x,y];
  return [mask.w/2, mask.h/2];
}

function randomOutsideLetters() {
  for(let t=0;t<500;t++){
    const x=Math.random()*canvas.width, y=Math.random()*canvas.height;
    if(!insideAnyLetter(x,y)) return [x,y];
  }
  return [Math.random()*canvas.width, Math.random()*canvas.height];
}

// ─── Layout ───────────────────────────────────────────────────────────────────
function rebuild() {
  cancelAnimationFrame(animId);
  resize();
  letterMasks = [];

  const CS    = glyphSize / 2;
  const H     = CS / 2;
  const PAD   = H * 0.5;
  const glyphW = CS*2 + H*2 + PAD*2;
  const glyphH = CS*2 + H*2 + PAD*2;

  const text  = document.getElementById('textInput').innerText || 'try me';
  const lines = text.split('\n');

  function isValidGlyph(ch) {
    return ch === '@' || (GLYPH_DATA[ch] && GLYPH_DATA[ch].c.length > 0);
  }

  let originY = (canvas.height - (lines.length*glyphH + (lines.length-1)*leading)) / 2;
  if(originY < 10) originY = 10;

  lines.forEach(line => {
    const chars = line.toLowerCase().split('');
    const lineW = chars.reduce((a,ch) => a + (isValidGlyph(ch)?glyphW:glyphW*0.5) + tracking, -tracking);
    let originX = (canvas.width - lineW) / 2;
    chars.forEach(ch => {
      const charW = isValidGlyph(ch) ? glyphW : glyphW*0.5;
      if(ch!==' ' && isValidGlyph(ch)) {
        const mask = buildGlyphMask(ch);
        if(mask) letterMasks.push({ mask, x:originX, y:originY, ch });
      }
      originX += charW + tracking;
    });
    originY += glyphH + leading;
  });

  globalMask = buildGlobalMask();
  buildTintedGlyphs();
  invertedGlyphs = []; invertedGlyphColor = null; // invalidate inverted cache
  spawnParticles();
  animate();
}

// ─── Spatial grid ─────────────────────────────────────────────────────────────
let grid = null, gridCellSize = 1, gridCols = 1, gridRows = 1;

function buildGrid(allParticles, gapSpacing) {
  const minDist = ptRadius*2 + gapSpacing;
  gridCellSize  = Math.max(1, minDist);
  gridCols = Math.ceil(canvas.width  / gridCellSize) + 1;
  gridRows = Math.ceil(canvas.height / gridCellSize) + 1;
  grid = new Array(gridCols * gridRows).fill(null).map(() => []);
  allParticles.forEach(p => {
    const cx = Math.floor(p.x / gridCellSize);
    const cy = Math.floor(p.y / gridCellSize);
    if(cx>=0&&cy>=0&&cx<gridCols&&cy<gridRows) grid[cy*gridCols+cx].push(p);
  });
}

function resolveCollisions(allParticles, gapSpacing) {
  if(gapSpacing < 0.1 && ptRadius < 0.5) return;
  const minDist = ptRadius*2 + gapSpacing;
  const minDist2 = minDist*minDist;
  allParticles.forEach(p => {
    const cx=Math.floor(p.x/gridCellSize);
    const cy=Math.floor(p.y/gridCellSize);
    for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++) {
      const nx=cx+dx, ny=cy+dy;
      if(nx<0||ny<0||nx>=gridCols||ny>=gridRows) continue;
      const cell=grid[ny*gridCols+nx];
      for(let i=0;i<cell.length;i++){
        const q=cell[i]; if(q===p) continue;
        const ex=p.x-q.x, ey=p.y-q.y;
        const d2=ex*ex+ey*ey;
        if(d2<minDist2&&d2>0.0001){
          const d=Math.sqrt(d2), push=(minDist-d)/d*0.5;
          const fx=ex*push, fy=ey*push;
          p.vx+=fx*0.4; p.vy+=fy*0.4;
          q.vx-=fx*0.4; q.vy-=fy*0.4;
        }
      }
    }
  });
}

// ─── Fill particle (passive, cursor-repelled, base layer) ────────────────────
class FillParticle {
  constructor(mask, ox, oy, mirrored=false) {
    this.mask = mask; this.ox = ox; this.oy = oy;
    this.mirrored = mirrored;
    this.released = false;

      const [lx, ly] = randomInsideMask(mask);
      this.x = ox+lx; this.y = oy+ly;
      this.lx = lx; this.ly = ly;
    
    const angle = Math.random()*Math.PI*2, spd = Math.random()*0.4;
    this.vx = Math.cos(angle)*spd; this.vy = Math.sin(angle)*spd;
    this.stuckFrames = 0;
  }

  update() {
    if (this.released) {
      // Released: scatter but stay inside the mask — bounce off letter walls
      this.vx *= 0.97; this.vy *= 0.97;
      const nx = this.x + this.vx, ny = this.y + this.vy;
      const nlx = nx - this.ox, nly = ny - this.oy;
      if (insideMask(this.mask, nlx, nly)) {
        this.x = nx; this.y = ny; this.lx = nlx; this.ly = nly;
      } else if (insideMask(this.mask, nlx, this.ly)) {
        this.x = nx; this.lx = nlx; this.vy *= -0.7;
      } else if (insideMask(this.mask, this.lx, nly)) {
        this.y = ny; this.ly = nly; this.vx *= -0.7;
      } else {
        this.vx *= -0.7; this.vy *= -0.7;
      }
      this.lx = this.x - this.ox; this.ly = this.y - this.oy;
      return;
    }

    const s = this.mirrored ? speed2 : speed;
    const dx = mouse.x - this.x, dy = mouse.y - this.y;
    const dist = Math.sqrt(dx*dx+dy*dy) || 1;
    if(mouse.active && !floatMode) {
      // Normal mode: repelled by cursor
      const push = Math.min(s*0.6, s*60/(dist+8));
      this.vx -= (dx/dist)*push*0.15; this.vy -= (dy/dist)*push*0.15;
    }
    // Float mode: pure brownian drift — slightly higher noise for organic feel
    const jitter = floatMode ? 0.18 : 0.08;
    this.vx += (Math.random()-0.5)*jitter; this.vy += (Math.random()-0.5)*jitter;
    this.vx *= 0.97; this.vy *= 0.97;
    const spd = Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    if(spd>s){this.vx=(this.vx/spd)*s;this.vy=(this.vy/spd)*s;}


      const nx=this.x+this.vx, ny=this.y+this.vy;
      const nlx=nx-this.ox, nly=ny-this.oy;
      if(insideMask(this.mask,nlx,nly)){
        this.x=nx; this.y=ny; this.lx=nlx; this.ly=nly; this.stuckFrames=0;
      } else if(insideMask(this.mask,nlx,this.ly)){
        this.x=nx; this.lx=nlx; this.vy*=0.3; this.stuckFrames=0;
      } else if(insideMask(this.mask,this.lx,nly)){
        this.y=ny; this.ly=nly; this.vx*=0.3; this.stuckFrames=0;
      } else {
        this.stuckFrames++;
        const probe=3; let nx2=0, ny2=0, samples=0;
        for(let a=0;a<8;a++){
          const ang=(a/8)*Math.PI*2;
          const px=this.lx+Math.cos(ang)*probe, py=this.ly+Math.sin(ang)*probe;
          if(!insideMask(this.mask,px,py)){nx2+=Math.cos(ang);ny2+=Math.sin(ang);samples++;}
        }
        if(samples>0){
          const tlen=Math.sqrt(nx2*nx2+ny2*ny2)||1;
          const tx=-ny2/tlen, ty=nx2/tlen;
          const sal=this.vx*tx+this.vy*ty;
          this.vx=tx*sal+(Math.random()-0.5)*0.1; this.vy=ty*sal+(Math.random()-0.5)*0.1;
          this.vx-=(nx2/tlen)*0.1; this.vy-=(ny2/tlen)*0.1;
        } else { this.vx*=-0.4; this.vy*=-0.4; }
        if(this.stuckFrames>45){
          const [lx,ly]=randomInsideMask(this.mask);
          this.x=this.ox+lx; this.y=this.oy+ly; this.lx=lx; this.ly=ly;
          const a=Math.random()*Math.PI*2;
          this.vx=Math.cos(a)*0.3; this.vy=Math.sin(a)*0.3; this.stuckFrames=0;
        }
      }
      this.lx=this.x-this.ox; this.ly=this.y-this.oy;
    
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, ptRadius, 0, Math.PI*2);
    ctx.fillStyle = this.mirrored ? quatCol : fillCol;
    ctx.fill();
  }
}

      }

    }

    const s = this.mirrored ? speed2 : speed;
    const dx = mouse.x - this.x, dy = mouse.y - this.y;
    const dist = Math.sqrt(dx*dx+dy*dy) || 1;
    if(mouse.active) {
      const pull = Math.min(s*0.6, s*60/(dist+8));
      this.vx += (dx/dist)*pull*0.15; this.vy += (dy/dist)*pull*0.15;
    }
    this.vx += (Math.random()-0.5)*0.3; this.vy += (Math.random()-0.5)*0.3;
    this.vx *= 0.85; this.vy *= 0.85;
    const spd = Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    if(spd>s){this.vx=(this.vx/spd)*s;this.vy=(this.vy/spd)*s;}


      const nx=this.x+this.vx, ny=this.y+this.vy;
      const nlx=nx-this.ox, nly=ny-this.oy;
      if(insideMask(this.mask,nlx,nly)){
        this.x=nx; this.y=ny; this.lx=nlx; this.ly=nly; this.stuckFrames=0;
      } else if(insideMask(this.mask,nlx,this.ly)){
        this.x=nx; this.lx=nlx; this.vy*=0.3; this.stuckFrames=0;
      } else if(insideMask(this.mask,this.lx,nly)){
        this.y=ny; this.ly=nly; this.vx*=0.3; this.stuckFrames=0;
      } else {
        this.stuckFrames++;
        const probe=3; let nx2=0, ny2=0, samples=0;
        for(let a=0;a<8;a++){
          const ang=(a/8)*Math.PI*2;
          const px=this.lx+Math.cos(ang)*probe, py=this.ly+Math.sin(ang)*probe;
          if(!insideMask(this.mask,px,py)){nx2+=Math.cos(ang);ny2+=Math.sin(ang);samples++;}
        }
        if(samples>0){
          const tlen=Math.sqrt(nx2*nx2+ny2*ny2)||1;
          const tx=-ny2/tlen, ty=nx2/tlen;
          const sal=this.vx*tx+this.vy*ty;
          this.vx=tx*sal*1.0+(Math.random()-0.5)*0.2; this.vy=ty*sal*1.0+(Math.random()-0.5)*0.2;
          this.vx-=(nx2/tlen)*0.15; this.vy-=(ny2/tlen)*0.15;
        } else {
          this.vx+=(this.ox+this.mask.w/2-this.x)*0.05;
          this.vy+=(this.oy+this.mask.h/2-this.y)*0.05;
        }
        if(this.stuckFrames>45){
          const [lx,ly]=randomInsideMask(this.mask);
          this.x=this.ox+lx; this.y=this.oy+ly; this.lx=lx; this.ly=ly;
          this.vx=(Math.random()-0.5)*0.5; this.vy=(Math.random()-0.5)*0.5; this.stuckFrames=0;
        }
      }
      this.lx=this.x-this.ox; this.ly=this.y-this.oy;
    
  }

  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, ptRadius, 0, Math.PI*2);
    ctx.fillStyle = this.mirrored ? tertCol : ptColor;
    ctx.fill();
  }
}

// ─── Spawn ────────────────────────────────────────────────────────────────────
function spawnParticles() {
  innerParticles = []; fillParticles = [];
  tertiaryParticles = []; quaternaryParticles = [];
  if(!letterMasks.length) return;
  const perLetter = Math.max(1, Math.round(particleCount / letterMasks.length));
  letterMasks.forEach(({mask, x, y}) => {
    for(let i=0;i<perLetter;i++){
      innerParticles.push(new InnerParticle(mask, x, y, false));
      fillParticles.push(new FillParticle(mask, x, y, false));
      tertiaryParticles.push(new InnerParticle(mask, x, y, true));
      quaternaryParticles.push(new FillParticle(mask, x, y, true));
    }
  });
}

// ─── Tinted glyph cache ───────────────────────────────────────────────────────
let tintedGlyphs = [];
function buildTintedGlyphs() {
  tintedGlyphs = letterMasks.map(({mask}) => {
    const tmp = document.createElement('canvas');
    tmp.width = mask.w; tmp.height = mask.h;
    const tc = tmp.getContext('2d');
    tc.drawImage(mask.canvas, 0, 0);
    tc.globalCompositeOperation = 'source-in';
    tc.fillStyle = glyphColor;
    tc.fillRect(0, 0, mask.w, mask.h);
    return tmp;
  });
}

// Re-tint cached glyph shapes with a given color (used in inverted mode, cached by color)
let invertedGlyphs = [];
let invertedGlyphColor = null;
function ensureInvertedGlyphs() {
  if (invertedGlyphColor === bgColor && invertedGlyphs.length === letterMasks.length) return;
  invertedGlyphColor = bgColor;
  invertedGlyphs = letterMasks.map(({mask}) => {
    const tmp = document.createElement('canvas');
    tmp.width = mask.w; tmp.height = mask.h;
    const tc = tmp.getContext('2d');
    tc.drawImage(mask.canvas, 0, 0);
    tc.globalCompositeOperation = 'source-in';
    tc.fillStyle = bgColor;
    tc.fillRect(0, 0, mask.w, mask.h);
    return tmp;
  });
}

// ─── Cursor ───────────────────────────────────────────────────────────────────
const isEmbedded = window.self !== window.top;
function drawCursor() {
  if(!mouse.active || isEmbedded) return;
  const r = 10;
  ctx.save();
  ctx.strokeStyle = ptColor;
  ctx.lineWidth   = 1;
  ctx.globalAlpha = 0.7;
  ctx.beginPath(); ctx.arc(mouse.x, mouse.y, r, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(mouse.x-r*1.6, mouse.y); ctx.lineTo(mouse.x-r*0.4, mouse.y);
  ctx.moveTo(mouse.x+r*0.4, mouse.y); ctx.lineTo(mouse.x+r*1.6, mouse.y);
  ctx.moveTo(mouse.x, mouse.y-r*1.6); ctx.lineTo(mouse.x, mouse.y-r*0.4);
  ctx.moveTo(mouse.x, mouse.y+r*0.4); ctx.lineTo(mouse.x, mouse.y+r*1.6);
  ctx.stroke(); ctx.restore();
}

// ─── Animate ──────────────────────────────────────────────────────────────────
function animate() {
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Glyph fills first (behind particles)
  tintedGlyphs.forEach((tg, i) => {
    const {x, y} = letterMasks[i];
    ctx.save(); ctx.globalAlpha = glyphOpacity; ctx.drawImage(tg, x, y); ctx.restore();
  });

  buildGrid(fillParticles, spacing);
  resolveCollisions(fillParticles, spacing);
  buildGrid(quaternaryParticles, spacing);
  resolveCollisions(quaternaryParticles, spacing);
  buildGrid(innerParticles, spacing);
  resolveCollisions(innerParticles, spacing);
  buildGrid(tertiaryParticles, spacing);
  resolveCollisions(tertiaryParticles, spacing);

  ctx.save(); ctx.globalAlpha = fillAlpha;
  fillParticles.forEach(p => { p.update(); p.draw(); });
  quaternaryParticles.forEach(p => { p.update(); p.draw(); });
  ctx.restore();
  innerParticles.forEach(p => { p.update(); p.draw(); });
  tertiaryParticles.forEach(p => { p.update(); p.draw(); });

  // Character labels (dev only)
  if (showLabels) {
    ctx.save();
    ctx.font = `${labelSize}px -apple-system, sans-serif`;
    ctx.fillStyle = labelColor;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowBlur = 0;
    letterMasks.forEach(({mask, x, y, ch}) => {
      ctx.fillText(ch.toUpperCase(), x + mask.w/2, y + mask.h/2);
    });
    ctx.restore();
  }

  drawCursor();
  animId = requestAnimationFrame(animate);
}

// ─── Resize ───────────────────────────────────────────────────────────────────
function resize() {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}

window.addEventListener('resize', () => { computeAutoSize(); rebuild(); });
// Allow parent portfolio page to trigger a resize+rebuild via postMessage
// after the iframe's pixel dimensions have been set (canvas was 0×0 on first boot)
window.addEventListener('message', (e) => {
  if (e.data === 'notype:resize') { resize(); computeAutoSize(); rebuild(); }
  if (e.data && e.data.type === 'notype:mouse') {
    if (e.data.active) { mouse.x = e.data.x; mouse.y = e.data.y; mouse.active = true; }
    else { mouse.active = false; }
  }
  if (e.data && e.data.type === 'notype:mousedown') {
    const scatter = (arr) => arr.forEach(p => {
      const angle = Math.random() * Math.PI * 2;
      const spd = 4 + Math.random() * 8;
      p.vx = Math.cos(angle) * spd; p.vy = Math.sin(angle) * spd; p.released = true;
    });
    scatter(innerParticles); scatter(fillParticles);
    scatter(tertiaryParticles); scatter(quaternaryParticles);
  }
  if (e.data && e.data.type === 'notype:mouseup') {
    innerParticles.forEach(p => p.released = false);
    fillParticles.forEach(p => p.released = false);
    tertiaryParticles.forEach(p => p.released = false);
    quaternaryParticles.forEach(p => p.released = false);
  }
});

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left);
  mouse.y = (e.clientY - r.top);
  mouse.active = true;
});
canvas.addEventListener('mouseleave', () => { mouse.active = false; });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  mouse.x = e.touches[0].clientX - r.left;
  mouse.y = e.touches[0].clientY - r.top;
  mouse.active = true;
}, { passive:false });
canvas.addEventListener('touchend', () => { mouse.active = false; });

// ─── Boot ─────────────────────────────────────────────────────────────────────
buildThemeDots();
applyTheme(0);
syncThemeEditors();
updateInputContrast();
// Wait a frame for layout to settle
requestAnimationFrame(() => {
  resize();
  enforceInputLimits();
  computeAutoSize();
  rebuild();
});
</script>
</body>
</html>
